workflows:
  ios-workflow:
   name: iOS Workflow

   environment:
     node: 20
     xcode: latest

     ios_signing:
       distribution_type: app_store
       bundle_identifier: com.simplebooking.app

   scripts:
     - name: Install dependencies
       script: npm install

     - name: Install Expo tools
       script: npm install -g eas-cli

     - name: Generate iOS project
       script: npx expo prebuild --platform ios

     - name: Install CocoaPods
       script: |
         cd ios
         pod install

     - name: Inspect iOS project
       script: |
         ls ios
         xcodebuild -list -workspace ios/*.xcworkspace

     - name: Build IPA
       script: |
         xcode-project build-ipa \
           --workspace ios/*.xcworkspace

   artifacts:
     - build/ios/ipa/*.ipa
     - /tmp/xcodebuild_logs/*.log 